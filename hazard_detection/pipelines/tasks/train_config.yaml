# General
epochs: 100
batch: 16
imgsz: 640
device: "cuda"  # or "mps" / "cpu"
project: "hazard_detection"
name: "yolo11_experiment"

# Model and data
data: "data.yaml"
cfg: "yolo11.yaml"  # Custom model config if needed
weights: ""  # Pretrained weights path, or leave "" to train from scratch

# Optimizer & LR
lr0: 0.01
lrf: 0.1
momentum: 0.937
weight_decay: 0.0005
optimizer: "SGD"

# Augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
